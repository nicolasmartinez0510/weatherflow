services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.3
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        depends_on:
            - mongodb
        environment:
            MONGODB_URI: '${MONGODB_URI:-mongodb://mongodb:27017}'
            MONGODB_DATABASE: '${MONGODB_DATABASE:-weatherflow}'
        ports:
            - '8100:80'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
    mongodb:
        image: mongo:7
        ports:
            - '27017:27017'
        volumes:
            - 'sail-mongodb:/data/db'
        networks:
            - sail
networks:
    sail:
        driver: bridge 
volumes:
    sail-mongodb:
        driver: local

